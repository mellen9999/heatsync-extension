<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=280">
  <title>heatsync</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 280px;
      background: #000;
      color: #fff;
      font-family: Inter, -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 13px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      background: #000;
    }
    .header img { width: 28px; height: 28px; }
    .header-title { font-size: 15px; font-weight: 600; flex: 1; }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      flex-shrink: 0;
    }
    .status-dot.green { background: #00cc66; }
    .status-dot.yellow { background: #ffcc00; }
    .status-dot.red { background: #ff4444; }

    .user-section { padding: 14px 16px; }
    .user-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .user-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: rgba(255,255,255,0.06);
    }
    .user-name { font-weight: 600; font-size: 14px; }
    .user-stats { color: #808080; font-size: 12px; }

    .login-section {
      padding: 14px 16px;
      text-align: center;
      color: #808080;
    }
    .login-btn {
      display: inline-block;
      margin-top: 8px;
      padding: 8px 16px;
      background: #ff6b35;
      color: #fff;
      border-radius: 0;
      text-decoration: none;
      font-size: 13px;
    }
    .login-btn:hover { background: #ff8555; }

    .actions {
      padding: 8px 16px 14px;
      display: flex;
      gap: 8px;
    }
    .action-btn {
      flex: 1;
      padding: 8px;
      background: rgba(255,255,255,0.06);
      border: none;
      border-radius: 0;
      color: #808080;
      font-size: 12px;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
    }
    .action-btn:hover { background: rgba(255,255,255,0.12); color: #fff; }

    .popout-section { padding: 8px 16px 14px; }
    .popout-row { display: flex; gap: 8px; }
    .popout-input {
      flex: 1;
      padding: 8px;
      background: #fff;
      color: #000;
      border: 1px solid #808080;
      font-size: 12px;
      font-family: inherit;
      outline: none;
    }
    .popout-input::placeholder { color: #808080; }
    .popout-btn { flex-shrink: 0; }

    .hint {
      padding: 10px 16px;
      text-align: center;
      color: #808080;
      font-size: 11px;
      border-top: 1px solid rgba(255,255,255,0.12);
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="icon-48.png" alt="">
    <span class="header-title">heatsync</span>
    <span class="status-dot yellow" id="status-dot" title="checking..."></span>
  </div>

  <div id="content"></div>

  <div class="popout-section">
    <div class="popout-row">
      <input type="text" class="popout-input" id="popout-input" placeholder="channel" spellcheck="false">
      <button class="action-btn popout-btn" id="popout-btn">popout</button>
    </div>
  </div>
  <div class="hint">emote settings in picker panel on chat</div>

  <script src="popup.js"></script>
</body>
</html>
